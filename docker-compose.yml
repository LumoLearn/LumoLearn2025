version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lumolearn-postgres
    environment:
      POSTGRES_DB: lumolearn
      POSTGRES_USER: lumolearn
      POSTGRES_PASSWORD: dev_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:6
    container_name: lumolearn-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  pgadmin:
    image: dpage/pgadmin4
    container_name: lumolearn-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lumolearn.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  mongo_data:
